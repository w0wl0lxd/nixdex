# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = false
no-default-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
  # `atomic-polyfill` is pulled in by `heapless` 0.7 (transitive via `postcard`).
  # No safe upgrade is available: `postcard` 1.x still depends on `heapless` 0.7,
  # and `heapless` 0.7 targets platforms without native atomics.
  { id = "RUSTSEC-2023-0089", reason = "transitive-only; no safe upgrade available" },
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "0BSD",
  "ISC",
  "Unicode-3.0",
  "CC0-1.0",
  "MPL-2.0",
  "Zlib",
  "Unlicense",
  "AGPL-3.0-only",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
private = { ignore = true, registries = [] }

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
