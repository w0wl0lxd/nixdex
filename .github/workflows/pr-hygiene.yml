name: pr-hygiene

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  changelog:
    name: changelog fragment present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check changelog fragment
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
        run: python3 scripts/changelog.py check --base "$BASE_REF"

  title-and-body:
    name: conventional title + no AI slop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check PR title (Conventional Commits)
        uses: actions/github-script@85e88a66eaa831097093a3d278536947f2984d20 # v4.0.1
        with:
          script: |
            const title = context.payload.pull_request.title || '';
            const conv = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/-]+\))?(!)?: .+/;
            const slop = /^(feat|fix|chore|docs)(\([^)]+\))?: (wip|tmp|temp|asdf|test|foo|bar|lorem|stuff|changes|update|misc)$/i;
            if (!conv.test(title)) {
              core.setFailed(`PR title is not Conventional Commits:\n  ${title}\nExpected: type(scope)?: description`);
            }
            if (title.length > 72) {
              core.setFailed(`PR title is ${title.length} chars (max 72)`);
            }
            if (/\.$/.test(title)) {
              core.setFailed('PR title must not end with a period');
            }
            if (slop.test(title.trim())) {
              core.setFailed(`PR title looks like placeholder slop: ${title}`);
            }

      - name: Check PR body (no AI attribution / empty shell)
        uses: actions/github-script@85e88a66eaa831097093a3d278536947f2984d20 # v4.0.1
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const patterns = [
              /Generated with \[?(Devin|Claude|Cursor|Copilot|Codex)/i,
              /Generated[- ]by:.*(Devin|Claude|Anthropic|Cursor|Copilot|OpenAI|Gemini)/i,
              /Co-[Aa]uthored-[Bb]y:.*(Devin|Claude|Anthropic|Cursor|Copilot|OpenAI|Gemini|Codex|Windsurf|Codeium|Tabnine|devin-ai-integration|copilot-swe-agent)/i,
              /Assisted-[Bb]y:.*(Devin|Claude|Anthropic|Cursor|Copilot|OpenAI|Gemini)/i,
              /🤖/,
              /AI[- ]generated/i,
              /AI[- ]assisted/i,
              /noreply@anthropic\.com/i,
              /noreply@openai\.com/i,
              /devin-ai-integration\[bot\]/i,
              /copilot-swe-agent\[bot\]/i,
            ];
            for (const re of patterns) {
              if (re.test(body)) {
                core.setFailed(`PR body contains AI attribution matching ${re}`);
              }
            }
            // Require a non-template Summary section
            const stripped = body
              .replace(/<!--[\s\S]*?-->/g, '')
              .replace(/^\s*[-*]\s*$/gm, '')
              .trim();
            if (stripped.length < 40) {
              core.setFailed('PR body is too short or still an empty template. Fill in Summary and Test plan.');
            }
            if (!/##\s*Summary/i.test(body) || !/##\s*Test plan/i.test(body)) {
              core.setFailed('PR body must keep ## Summary and ## Test plan sections.');
            }

      - name: Check commits on the PR
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 - <<'PY'
          import os, pathlib, re, subprocess, sys

          base = os.environ['BASE_SHA']
          head = os.environ['HEAD_SHA']

          conv = re.compile(r'^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/-]+\))?(!)?: .+')

          # Load the canonical AI-attribution patterns from the local git hook
          # so CI enforces the same list as the commit-msg/pre-push hooks.
          hook_path = pathlib.Path('.githooks/lib/ai-attribution.sh')
          hook_src = hook_path.read_text()
          m = re.search(r'AI_ATTR_PATTERNS=\((.*?)\)', hook_src, re.S)
          if m:
              ai_strings = re.findall(r"(?m)^\s*'([^']*)'", m.group(1))
              ai_patterns = [re.compile(p, re.I) for p in ai_strings]
          else:
              print('Error: Could not parse AI_ATTR_PATTERNS from hook script.', file=sys.stderr)
              sys.exit(1)

          try:
              shas = subprocess.check_output(['git', 'log', '--format=%H', f'{base}..{head}']).decode().splitlines()
          except subprocess.CalledProcessError as e:
              print(f'Failed to list commits: {e}', file=sys.stderr)
              sys.exit(1)

          failures = []
          for sha in shas:
              msg = subprocess.check_output(['git', 'log', '-1', '--format=%s%n%b', sha]).decode()
              author = subprocess.check_output(['git', 'log', '-1', '--format=%an <%ae>', sha]).decode()
              subject = msg.splitlines()[0] if msg.splitlines() else ''
              if not conv.match(subject):
                  failures.append(f'{sha[:7]} non-conventional: {subject}')
              for pat in ai_patterns:
                  if pat.search(msg) or pat.search(author):
                      failures.append(f'{sha[:7]} AI attribution: {subject}')
                      break

          if failures:
              print('\n'.join(failures))
              sys.exit(1)
          PY
