name: benchmark

on:
  # Run fast SearchDb benchmark on PRs and pushes to main so regressions are
  # caught, but only when files that can affect benchmarked code change.
  # Heavy full index benchmarks stay on off-peak scheduled runs.
  pull_request:
    paths: &benchmark_paths
      - 'crates/nixdex-core/**'
      - 'crates/nixdex-cli/**'
      - 'crates/nixdex/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'criterion.toml'
      - 'scripts/benchmark-*.sh'
      - 'justfile'
      - '.github/workflows/benchmark.yml'
  push:
    branches: [main, master]
    paths: *benchmark_paths
  # Run benchmarks off-peak on a dedicated runner schedule to reduce
  # resource contention and get stable wall-clock numbers.
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      nixpkgs:
        description: 'nixpkgs expression or path to benchmark'
        required: true
        default: '<nixpkgs>'
      mode:
        description: 'benchmark mode: eval (only nixpkgs eval) or full (eval + fetch + write)'
        required: true
        default: 'eval'
      runs:
        description: 'number of hyperfine runs'
        required: true
        default: '1'

permissions:
  contents: read

# Only one benchmark workflow at a time so runner resources are not
# competing with another instance of this same benchmark.
concurrency:
  group: benchmark
  cancel-in-progress: false

jobs:
  searchdb-benchmark:
    name: SearchDb criterion benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SCCACHE_DIR: /home/runner/.cache/sccache
      SCCACHE_CACHE_SIZE: 2G
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y sccache clang mold
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run SearchDb criterion benchmark
        run: cargo bench --bench search
      - name: Upload Criterion report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: criterion-report
          path: target/criterion/

  locate-benchmark:
    name: nixdex locate vs nix-locate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SCCACHE_DIR: /home/runner/.cache/sccache
      SCCACHE_CACHE_SIZE: 2G
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Restore prebuilt index cache
        uses: actions/cache@4a148e2d2863fbcf79f81f4f4d5e0bf9b628618e # v4.2.0
        with:
          path: ~/.cache/nixdex
          key: nixdex-prebuilt-${{ runner.os }}-${{ hashFiles('crates/nixdex-core/src/prebuilt.rs') }}
          restore-keys: |
            nixdex-prebuilt-${{ runner.os }}-
      - name: Install build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y sccache clang mold hyperfine
          if ! command -v nix-locate >/dev/null 2>&1; then
            sudo apt-get install -y nix-index || true
          fi
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run locate benchmark
        run: bash scripts/benchmark-locate.sh
      - name: Upload locate benchmark report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: locate-benchmark-report
          path: /tmp/nixdex-bench-locate.md

  index-benchmark:
    name: nixdex index benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 360
    needs: searchdb-benchmark
    env:
      SCCACHE_DIR: /home/runner/.cache/sccache
      SCCACHE_CACHE_SIZE: 2G
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y sccache clang mold
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build and run index benchmark
        run: |
          nix-shell -p nix-eval-jobs hyperfine --run \
            "./scripts/benchmark-index.sh '${{ github.event.inputs.nixpkgs || '<nixpkgs>' }}' '${{ github.event.inputs.mode || 'eval' }}' '${{ github.event.inputs.runs || '1' }}'"
      - name: Upload benchmark report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: index-benchmark-report
          path: /tmp/nixdex-bench-*.md
