name: hax

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'crates/nixdex-core/src/**'
  push:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 3'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hax:
    name: hax extraction
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: hacspec/hax-actions@6c734302f9a0434cf590e0ba18c9dd9b28fc6659
        with:
          hax_reference: cargo-hax-v0.3.7
      - name: Extract nixdex-core/frcode to F*
        working-directory: crates/nixdex-core
        run: cargo hax into -i '-** +nixdex_core::frcode::**' fstar
      - name: Upload F* extraction
        uses: actions/upload-artifact@v4
        with:
          name: hax-fstar-extraction
          path: crates/nixdex-core/proofs/fstar/extraction/
          retention-days: 7
